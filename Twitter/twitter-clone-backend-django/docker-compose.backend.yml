services:
  frontend:
    build:
      context: ../twitter-clone-with-next-js-frontend
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      API_BASE_URL_INTERNAL: http://web:8000/api/v1
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../twitter-clone-with-next-js-frontend:/app
      - /app/node_modules
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');http.get('http://localhost:3000',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./.env
    environment:
      KAFKA_ENABLED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      AD_HOMINEM_MODEL_ENDPOINT: http://nlp-api:9000/predict
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      nlp-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=5)",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  moderation-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py consume_moderation_events --from-beginning
    env_file:
      - ./.env
    environment:
      KAFKA_ENABLED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      AD_HOMINEM_MODEL_ENDPOINT: http://nlp-api:9000/predict
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      nlp-api:
        condition: service_healthy
    restart: unless-stopped

  moderation-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py run_moderation_scheduler --interval-seconds 60 --batch-size 200
    env_file:
      - ./.env
    environment:
      KAFKA_ENABLED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: twitter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twitter"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  kafka:
    image: redpandadata/redpanda:v24.2.12
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    command: ["--redis.addr=redis://redis:6379"]
    depends_on:
      - redis
    ports:
      - "9121:9121"
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@db:5432/twitter?sslmode=disable
    depends_on:
      - db
    ports:
      - "9187:9187"
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command:
      - --kafka.server=kafka:9092
    depends_on:
      - kafka
    ports:
      - "9308:9308"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - web
      - redis-exporter
      - postgres-exporter
      - kafka-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  nlp-api:
    build:
      context: ../../Ad Hominem Detection
      dockerfile: Dockerfile.api
    ports:
      - "9000:9000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=5)",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py test
    env_file:
      - ./.env
    volumes:
      - ./:/app
    depends_on:
      - db
    profiles:
      - test

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
